services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: conf-auth-keycloak
    command:
      - start-dev
      - --import-realm
      - --log-level=INFO,org.keycloak.events:DEBUG
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KC_PORT:-8180}:8080"
    volumes:
      - ./realm.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf 'GET /realms/mcpkit-test HTTP/1.0\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          grep -q '200 OK' <&3
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
